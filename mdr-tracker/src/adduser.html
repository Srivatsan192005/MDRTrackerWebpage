<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - MDR Vehicle Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="addUserPage">
    <div class="route-controls">
        <button id="backToDashboardBtn" class="logout-btn">←</button>
    </div>
    
    <div class="login-header" style="margin-bottom: 24px;">
        <img src="/mdr_monogram.png" alt="MDR Logo" style="width: 100px; margin-bottom: 16px; filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));" />
        <h3 class="route-title" style="font-size: 26px;">User Management Dashboard</h3>
        <p class="route-subtitle" style="font-size: 14px;">Manage administrative and employee accounts</p>
    </div>

    <!-- Tabs Container -->
    <div class="tabs-container">
        <button id="tabAddBtn" class="tab-btn active">👤 Add New User</button>
        <button id="tabRemoveBtn" class="tab-btn">📋 View & Remove Users</button>
    </div>

    <!-- TAB 1: ADD USER FORM -->
    <div id="addSection" class="tab-content active">
        <div class="login-container">
            <h3 class="login-title" style="font-size: 22px;">Create Account</h3>
            <p class="login-subtitle" style="margin-bottom: 24px;">Register a new user directly in the tracking system</p>
            
            <div class="input-group">
                <input type="text" id="newEmployeeName" placeholder="Employee Name" class="input-field" required />
            </div>

            <div class="input-group">
                <input type="email" id="newEmail" placeholder="User Email (@mdrtox.com)" class="input-field" required />
            </div>

            <div class="input-group">
                <input type="password" id="newPassword" placeholder="Password (Emp-id)" class="input-field" required />
                <div id="togglePassword" class="password-toggle eye-open"></div>
            </div>

            <div class="input-group">
                <select id="userRole" class="input-field">
                    <option value="employee">employee</option>
                    <option value="admin">admin</option>
                </select>
            </div>

            <div class="input-group">
                <select id="assignedRoute" class="input-field">
                    <option value="">No Route Assigned</option>
                    <option value="TAMBARAM">TAMBARAM</option>
                    <option value="PERAMBUR">PERAMBUR</option>
                    <option value="AVADI">AVADI</option>
                    <option value="general">general</option>
                </select>
            </div>

            <div class="input-group" id="vehicleNumberGroup" style="display: none;">
                <select id="newVehicleNumber" class="input-field">
                    <option value="">Select Vehicle</option>
                    <option value="FORD ENDEAVOUR (TN19-AL-2122)">FORD ENDEAVOUR (TN19-AL-2122)</option>
                    <option value="HYUNDAI CRETA (TN18-AH-7925)">HYUNDAI CRETA (TN18-AH-7925)</option>
                    <option value="MAHINDRA BOLERO(TN22-ED-7234)">MAHINDRA BOLERO(TN22-ED-7234)</option>
                    <option value="MARUTI SWIFT(GREY COLOR) (TN07-CS-3744)">MARUTI SWIFT(GREY COLOR) (TN07-CS-3744)</option>
                    <option value="MARUTI SWIFT(SAFFRON COLOR) (TN02-BS-1586)">MARUTI SWIFT(SAFFRON COLOR) (TN02-BS-1586)</option>
                    <option value="MERCEDES BENZ (TN01-BC-0171)">MERCEDES BENZ (TN01-BC-0171)</option>
                    <option value="TOYOTA URBAN CRUISER (TN19-CZ-1325)">TOYOTA URBAN CRUISER (TN19-CZ-1325)</option>
                </select>
            </div>

            <button id="createUserBtn" class="login-btn">Add User</button>
            <div id="statusText" class="error-text" style="display: none;"></div>
        </div>
    </div>

    <!-- TAB 2: REMOVE USER TABLE -->
    <div id="removeSection" class="tab-content">
        <div class="table-container">
            <div style="margin-bottom: 20px; position: relative; width: 100%;">
                <input type="text" id="userSearchInput" placeholder="🔍" class="input-field" style="width: 100%; border-radius: 12px; font-size: 15px; box-shadow: 0 4px 12px rgba(11, 60, 117, 0.04); min-height: 48px; border: 1.5px solid #e2e8f0; box-sizing: border-box;" />
            </div>
            <div class="table-responsive">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Assigned Route</th>
                            <th>Vehicle Number</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; color: #6b7280; padding: 20px;">Loading users...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/src/adduser.js"></script>
</body>
</html>
