<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="src/style.css"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest?v=2" />
    <meta name="theme-color" content="#1d1b2f" />
    <meta charset="UTF-8" />
    <title>MDR VEHICLE TRACKING</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
</head>
<body>
    <div id="loginPage">
        <div class="login-header">
            <img src="/mdr.png" alt="MDR Logo" class="login-logo" />
        </div>
        
        <div class="login-container">
            <h3 class="login-title">MDR Vehicle Tracking</h3>
            <p class="login-subtitle">Sign in</p>
            
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Enter email" class="input-field" />
            </div>

            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter password" class="input-field" />
                <div id="togglePassword" class="password-toggle eye-open"></div>
            </div>

            <button id="loginBtn" class="login-btn">Login</button>

            <div id="errorText" class="error-text" style="display: none;">
                Invalid login details
            </div>
        </div>
    </div>

    <div id="routeSelectionPage" style="display: none;">
        <div class="route-controls admin-menu-wrap">
            <button id="adminMenuToggle" class="admin-menu-toggle" type="button" aria-expanded="false" aria-controls="adminMenuPanel" aria-label="Open admin menu">☰ Menu</button>
            <div id="adminMenuPanel" class="admin-menu-panel" aria-hidden="true">
                <button id="addUserBtn" class="admin-menu-btn admin-menu-manage" type="button">👥 Manage Users</button>
                <button id="routeLogoutBtn" class="admin-menu-btn admin-menu-logout" type="button">🚪 Logout</button>
            </div>
        </div>
        <div class="route-header">
            <img src="/mdr_monogram.png" alt="MDR Logo" class="route-logo" />
            <h3 class="route-title">Select a Route</h3>
            <p class="route-subtitle">Choose a route to track vehicles</p>
        </div>
        
        <div id="routeList" class="routes-grid"></div>
    </div>

    <div id="trackingPage" style="display: none;">
        
        <div id="bar" class="sidebar">
            <div class="sidebar-header">
              <div class="sidebar-actions">
  <button id="sidebarBackButton" class="action-btn back-btn" onclick="backToRoutes()"></button>
  <button id="sidebarLogoutButton" class="action-btn logout-btn" aria-label="Sign out"></button>
</div>

                <h3 id="driverList" class="route-info">Drivers</h3>
            </div>
            
            <div class="drivers-container">
                <div class="sidebar-footer">
                    <button id="feedbackButton" class="feedback-btn">
                        <span class="feedback-icon">💬</span>
                        <span>Send Feedback</span>
                    </button>
                </div>
            </div>
        </div>

        <button id="toggleSidebarBtn" class="toggle-sidebar">☰</button>

        <div class="map-container">
            <div id="map"></div>
            
            <div id="speedCircle" class="speed-indicator" style="display: none;">
                0 km/h
            </div>
            
            <div id="etaDisplay" class="eta-display" style="display: none;">
                <div class="eta-header">📍 Your Location</div>
                <div class="eta-time">ETA: --</div>
            </div>
            
            <div class="map-controls">
                <button id="toggleTrafficBtn" class="map-btn traffic-btn"></button>
                <button id="zoomToVehicleBtn" title="Zoom to Vehicle" class="map-btn zoom-btn"></button>
                <button id="toggleEmployeeLocationBtn" title="Toggle ETA" class="map-btn location-btn eta-btn"></button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
